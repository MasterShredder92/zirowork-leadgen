<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg:          #17161b;
    --sidebar-bg:  #0f0e13;
    --surface:     #1c1b20;
    --border:      rgba(255,255,255,0.08);
    --border-med:  rgba(255,255,255,0.12);
    --text:        #F5F4F2;
    --text-1:      #F5F4F2;
    --text-2:      #A8A5A0;
    --text-3:      #6E6B66;
    --text-4:      #4A4845;
    --text-secondary: #A8A5A0;
    --text-muted:  #6E6B66;
    --accent:      #FD802E;
    --row-hover:   rgba(255,255,255,0.04);
    --nav-active:  rgba(255,255,255,0.08);
    --bg-card:     #1c1b20;
    --bg-hover:    rgba(255,255,255,0.08);
    --shadow-sm:   0 1px 2px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.3);
    --shadow-md:   0 4px 12px rgba(0,0,0,0.5), 0 1px 2px rgba(0,0,0,0.3);
    --shadow-lg:   -1px 0 0 rgba(255,255,255,0.06), -20px 0 60px rgba(0,0,0,0.6);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg:          #fafaf8;
      --sidebar-bg:  #f5f3f0;
      --surface:     #ffffff;
      --border:      rgba(0,0,0,0.08);
      --border-med:  rgba(0,0,0,0.12);
      --text:        #1a1a1a;
      --text-1:      #1a1a1a;
      --text-2:      #4A4A48;
      --text-3:      #717170;
      --text-4:      #8C8C8A;
      --text-secondary: #4A4A48;
      --text-muted:  #717170;
      --accent:      #D9641C;
      --row-hover:   rgba(0,0,0,0.04);
      --nav-active:  rgba(0,0,0,0.08);
      --bg-card:     #ffffff;
      --bg-hover:    #f0f0f0;
      --shadow-sm:   0 1px 2px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.1);
      --shadow-md:   0 4px 12px rgba(0,0,0,0.1), 0 1px 2px rgba(0,0,0,0.08);
      --shadow-lg:   -1px 0 0 rgba(0,0,0,0.06), -20px 0 60px rgba(0,0,0,0.15);
    }
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-size: 14px;
    line-height: 1.5;
  }

  #root { width: 100%; height: 100%; display: flex; }

  /* Scrollbars — Attio style: extremely minimal */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

  /* Mobile page transitions — direction-aware, spring easing */
  @keyframes zwPageIn  { from { opacity:0; transform:translateX(12px);  } to { opacity:1; transform:none; } }
  @keyframes zwPageBack{ from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:none; } }

  /* EQ icon bars + mobile header entrance */
  @keyframes eqB1 { 0%,100%{transform:scaleY(.62)} 50%{transform:scaleY(1)} }
  @keyframes eqB2 { 0%,100%{transform:scaleY(1)}   50%{transform:scaleY(.48)} }
  @keyframes eqB3 { 0%,100%{transform:scaleY(.68)} 50%{transform:scaleY(.96)} }
  @keyframes eqB4 { 0%,100%{transform:scaleY(.88)} 50%{transform:scaleY(.4)} }
  @keyframes mhSlideDown { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:none} }

  textarea { line-height: 1.5; }
  ::selection { background: rgba(224,77,39,0.15); color: var(--text-1); }

  /* Eliminate 300ms tap delay on mobile across all interactive elements */
  button, a, [role="button"], input, select, textarea { touch-action: manipulation; }

  /* Mobile touch feedback — subtle press scale + opacity */
  @media (max-width: 768px) {
    button:active { opacity: 0.72; transform: scale(0.97); transition: opacity 0.08s, transform 0.08s; }
    a:active      { opacity: 0.72; }
  }
</style>
