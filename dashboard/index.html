<script>
  // Apply saved theme before paint to avoid a flash
  (function () {
    try {
      if (localStorage.getItem('zw-portal-theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) {}
  })();
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }

  /* Force light theme always — warm cream/sand palette, pumpkin accent */
  :root {
    --bg:       #F7F2E8;
    --surface:  #FFFFFF;
    --sidebar:  #E8DCC8;
    --border:   rgba(0,0,0,0.07);
    --bmed:     rgba(0,0,0,0.11);
    --hover:    rgba(0,0,0,0.04);
    --t1:       #162833;
    --t2:       #3D4F58;
    --t3:       #6B7880;
    --t4:       #8C9298;
    --accent:   #D9641C;
    --accent-bg: rgba(217,100,28,0.09);
  }

  /* Dark theme — neutral graphite, pumpkin accent (matches operator CRM) */
  html[data-theme="dark"] {
    --bg:       #1A1C1F;
    --surface:  #26292D;
    --sidebar:  #141619;
    --border:   rgba(255,255,255,0.08);
    --bmed:     rgba(255,255,255,0.13);
    --hover:    rgba(255,255,255,0.05);
    --t1:       #F5F4F1;
    --t2:       #B0ADA9;
    --t3:       #8A8784;
    --t4:       #63605D;
    --accent:   #FD802E;
    --accent-bg: rgba(253,128,46,0.15);
  }

  /* ZiroWork bolt logo — swaps with theme */
  .zw-logo {
    flex-shrink: 0;
    background-image: url('/92-design/brand/zw-bolt-light.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
  }
  html[data-theme="dark"] .zw-logo {
    background-image: url('/92-design/brand/zw-bolt-dark.png');
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--t1);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
  }

  #root { width: 100%; height: 100%; display: flex; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
  html[data-theme="dark"] ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.14); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>

</head>

<div id="root"></div>

</body>
